    /* ===================== ZONA EDITABLE DE COLORES =====================
       Cambia estos códigos HEX para modificar la paleta de toda la presentación.
       Amarillo: #FBE122 | Dorado: #DAA000 | Verde: #007B3E | Verde oscuro: #00482B
    */
    :root {
      --uc-yellow: #FBE122;
      --uc-gold: #DAA000;
      --uc-green: #007B3E;
      --uc-dark-green: #00482B;
      --uc-cream: #FFFBEA;
      --uc-white: #FFFFFF;
      --uc-shadow: rgba(0, 72, 43, 0.28);
    }

    * { box-sizing: border-box; font-family: 'Sora', sans-serif; }
    body { margin: 0; background: var(--uc-cream); }

    #app {
      background:
        radial-gradient(circle at 8% 12%, rgba(251,225,34,0.40), transparent 24%),
        radial-gradient(circle at 94% 10%, rgba(0,123,62,0.25), transparent 22%),
        linear-gradient(135deg, #fffbe8 0%, #f8f4d7 42%, #e8f4e8 100%);
    }

    #app::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(120deg, rgba(0,72,43,0.06) 0 1px, transparent 1px),
        linear-gradient(30deg, rgba(218,160,0,0.08) 0 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
    }

    .uc-top-strip {
      height: 8px;
      background: linear-gradient(90deg, var(--uc-yellow) 0 25%, var(--uc-gold) 25% 50%, var(--uc-green) 50% 75%, var(--uc-dark-green) 75% 100%);
      box-shadow: 0 4px 16px rgba(0,72,43,0.18);
    }

    .slide { display: none; opacity: 0; transform: translateY(20px) scale(0.985); }
    .slide.active { display: flex; animation: slideIn 0.5s ease forwards; }
    @keyframes slideIn { to { opacity: 1; transform: translateY(0) scale(1); } }

    .uc-card {
      position: relative;
      width: min(980px, 100%);
      min-height: 68vh;
      overflow: hidden;
      border-radius: 32px;
      border: 1px solid rgba(0,72,43,0.16);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 28px 80px rgba(0,72,43,0.18);
      backdrop-filter: blur(14px);
    }

    .uc-card::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      right: -85px;
      top: -85px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(251,225,34,0.92), rgba(218,160,0,0.30) 58%, transparent 62%);
    }

    .uc-card::after {
      content: '';
      position: absolute;
      width: 240px;
      height: 240px;
      left: -90px;
      bottom: -90px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,123,62,0.85), rgba(0,72,43,0.20) 56%, transparent 62%);
    }

    .uc-ribbon {
      height: 12px;
      width: 100%;
      background: linear-gradient(90deg, var(--uc-yellow) 0 25%, var(--uc-gold) 25% 50%, var(--uc-green) 50% 75%, var(--uc-dark-green) 75% 100%);
    }

    .uc-badge {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      padding: .58rem 1rem;
      border-radius: 999px;
      color: var(--uc-dark-green);
      background: rgba(251,225,34,0.34);
      border: 1px solid rgba(218,160,0,0.32);
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
      font-size: .78rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      color: white;
      background: linear-gradient(135deg, var(--uc-green), var(--uc-dark-green));
      box-shadow: 0 14px 28px rgba(0,72,43,0.28);
      font-weight: 900;
      letter-spacing: -0.08em;
    }

    .decor-blocks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: min(520px, 100%);
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(0,72,43,0.12);
    }
    .decor-blocks span:nth-child(1) { background: var(--uc-yellow); }
    .decor-blocks span:nth-child(2) { background: var(--uc-gold); }
    .decor-blocks span:nth-child(3) { background: var(--uc-green); }
    .decor-blocks span:nth-child(4) { background: var(--uc-dark-green); }

    .resource-btn, .nav-btn, .menu-item, .module-card, .back-btn {
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease, opacity .22s ease;
    }
    .resource-btn, .module-card {
      position: relative;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(0,72,43,0.18);
    }
    .resource-btn:hover, .module-card:hover, .nav-btn:hover, .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(0,72,43,0.24);
    }
    .resource-btn::before, .module-card::before {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-110%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transition: transform .6s ease;
    }
    .resource-btn:hover::before, .module-card:hover::before { transform: translateX(110%); }

    .back-btn {
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      align-self: flex-start;
    }

    @media (min-width: 768px) {
      .back-btn { margin-top: 1.75rem; }
    }

    .sidebar-open { transform: translateX(0); }
    .sidebar-closed { transform: translateX(-100%); }
    .sidebar-transition { transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .menu-item.active-item { background: rgba(251,225,34,0.16); border-left: 4px solid var(--uc-yellow); }
    .menu-item:hover { background: rgba(255,255,255,0.11); }
    .progress-bar, .dot { transition: all .28s ease; }
    .dot.active-dot { width: 30px; border-radius: 999px; }

    .modal { display: none; opacity: 0; transform: scale(0.95); pointer-events: none; transition: all 0.3s ease; }
    .modal.active-modal { display: flex; opacity: 1; transform: scale(1); pointer-events: auto; }

    @media (max-width: 760px) {
      .uc-card { min-height: 70vh; border-radius: 24px; }
      .slide-title { font-size: 2.35rem !important; }
    }


    /* Avatar expositor UdeC mejorado con boca animada */
    .speaker-avatar {
      position: absolute;
      right: 22px;
      bottom: 88px;
      z-index: 35;
      width: 255px;
      max-width: calc(100vw - 32px);
      border-radius: 30px;
      background: rgba(255,255,255,.94);
      border: 2px solid rgba(0,72,43,.20);
      box-shadow: 0 24px 56px rgba(0,72,43,.28);
      backdrop-filter: blur(14px);
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }
    .speaker-avatar-header { padding: 10px 14px; color: #00482B; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .06em; background: linear-gradient(90deg,#FBE122 0%,#DAA000 45%,#007B3E 100%); display:flex; align-items:center; justify-content:space-between; }
    .speaker-avatar-header::after { content: '●'; color: #00482B; font-size: 14px; text-shadow: 0 0 10px rgba(251,225,34,.85); }
    .speaker-avatar.speaking .speaker-avatar-header::after { color:#FBE122; animation: voiceBlink .7s infinite alternate; }
    @keyframes voiceBlink { from { opacity:.35; transform:scale(.8); } to { opacity:1; transform:scale(1.15); } }
    .speaker-avatar-body { display: flex; gap: 12px; align-items: center; padding: 12px; }
    .avatar-video-wrap { position: relative; flex: 0 0 96px; width: 96px; height: 110px; border-radius: 30px 30px 38px 38px; overflow: visible; background: radial-gradient(circle at 50% 20%, rgba(251,225,34,.36), transparent 42%), linear-gradient(160deg,#FBE122 0%,#DAA000 46%,#007B3E 100%); border: 3px solid #00482B; box-shadow: 0 14px 28px rgba(0,72,43,.28); display:grid; place-items:center; }
    .avatar-video-wrap::before { content:''; position:absolute; width:78px; height:15px; top:5px; left:50%; transform:translateX(-50%); border-radius:999px; background:linear-gradient(90deg,#00482B,#007B3E); box-shadow:0 6px 12px rgba(0,72,43,.24); z-index:3; }
    .avatar-video-wrap::after { content:''; position:absolute; inset:6px; border-radius:26px 26px 34px 34px; box-shadow:inset 0 0 0 2px rgba(255,255,255,.35); pointer-events:none; z-index:5; }
    .avatar-character { position:relative; width:72px; height:88px; display:grid; place-items:center; }
    .avatar-head { position:absolute; top:15px; width:66px; height:66px; border-radius:48% 48% 44% 44%; background:linear-gradient(180deg,#FFE66D 0%,#FBE122 60%,#E4B300 100%); border:3px solid #00482B; box-shadow:inset 0 -8px 0 rgba(218,160,0,.20),0 10px 18px rgba(0,72,43,.18); z-index:2; }
    .avatar-face-glow { position:absolute; top:28px; left:50%; width:42px; height:34px; transform:translateX(-50%); border-radius:50%; background:rgba(255,255,255,.18); z-index:3; pointer-events:none; }
    .avatar-eye { position:absolute; top:39px; width:8px; height:10px; border-radius:999px; background:#00482B; z-index:4; animation:avatarBlink 4.2s infinite; }
    .avatar-eye.left { left:22px; }
    .avatar-eye.right { right:22px; }
    @keyframes avatarBlink { 0%,92%,100% { transform:scaleY(1); } 95% { transform:scaleY(.12); } }
    .avatar-mouth { position:absolute; left:50%; top:58px; width:24px; height:10px; transform:translateX(-50%); border-radius:0 0 18px 18px; background:#00482B; z-index:4; box-shadow:inset 0 -3px 0 rgba(0,0,0,.16); }
    .avatar-mouth::after { content:''; position:absolute; left:50%; bottom:2px; width:12px; height:3px; transform:translateX(-50%); border-radius:999px; background:rgba(251,225,34,.75); }
    .avatar-body-shape { position:absolute; bottom:-5px; width:60px; height:28px; border-radius:22px 22px 10px 10px; background:linear-gradient(135deg,#00482B,#007B3E); border:3px solid #00482B; z-index:1; }
    .avatar-sound-waves { position:absolute; right:-10px; top:36px; width:20px; height:38px; opacity:0; z-index:6; }
    .avatar-sound-waves span { position:absolute; left:0; border:3px solid #FBE122; border-left:0; border-top-color:transparent; border-bottom-color:transparent; border-radius:0 999px 999px 0; filter:drop-shadow(0 0 6px rgba(251,225,34,.65)); }
    .avatar-sound-waves span:nth-child(1){ width:10px;height:18px;top:10px; }
    .avatar-sound-waves span:nth-child(2){ width:17px;height:28px;top:5px; }
    .speaker-avatar.speaking .avatar-video-wrap { animation:avatarPulse .7s ease-in-out infinite alternate; }
    .speaker-avatar.speaking .avatar-mouth { animation:mouthTalk .16s linear infinite alternate; border-radius:50% 50% 45% 45%; }
    .speaker-avatar.speaking .avatar-sound-waves { opacity:1; animation:soundWave .65s ease-in-out infinite alternate; }
    @keyframes avatarPulse { from { transform:translateY(0) scale(1); } to { transform:translateY(-2px) scale(1.035); } }
    @keyframes mouthTalk { 0% { width:18px;height:5px;top:60px; } 40% { width:26px;height:14px;top:56px; } 100% { width:20px;height:19px;top:54px; } }
    @keyframes soundWave { from { transform:translateX(-2px) scale(.86); opacity:.45; } to { transform:translateX(3px) scale(1.12); opacity:1; } }
    .avatar-info { text-align:left; min-width:0; }
    .avatar-name { color:#00482B; font-size:15px; font-weight:900; line-height:1.1; }
    .avatar-status { margin-top:5px; color:rgba(0,72,43,.74); font-size:11px; line-height:1.25; }
    .avatar-controls { display:flex; gap:7px; padding:0 12px 12px; }
    .avatar-mini-btn { flex:1; border:0; border-radius:999px; padding:8px 9px; font-size:11px; font-weight:900; color:white; background:#00482B; cursor:pointer; box-shadow:0 8px 18px rgba(0,72,43,.20); }
    .avatar-mini-btn.secondary { background:#007B3E; }
    .avatar-mini-btn:hover { transform:translateY(-1px); }

    .speak-hover-highlight {
      outline: 3px solid rgba(251,225,34,.95);
      outline-offset: 4px;
      box-shadow: 0 0 0 8px rgba(251,225,34,.18), 0 18px 38px rgba(0,72,43,.20) !important;
    }
    @media (max-width: 760px) { .speaker-avatar { right: 12px; bottom: 78px; width: 215px; } .speaker-avatar-body { padding: 9px; gap:8px; } .avatar-video-wrap { width: 78px; height: 92px; flex-basis: 78px; } .avatar-character { transform: scale(.82); } .avatar-name { font-size: 12px; } .avatar-status { font-size: 10px; } }


    /* AJUSTE FINAL: avatar más grande y minimizable, conservando la voz. Cada regla controla tamaño, estado normal y estado minimizado. */
    .speaker-avatar {
      width: 335px !important;
      right: 24px !important;
      bottom: 96px !important;
      transition: width .25s ease, height .25s ease, border-radius .25s ease, transform .25s ease, box-shadow .25s ease;
    }
    .speaker-avatar .avatar-video-wrap {
      flex-basis: 125px !important;
      width: 125px !important;
      height: 145px !important;
    }
    .speaker-avatar .avatar-character { transform: scale(1.24); }
    .speaker-avatar .avatar-name { font-size: 20px !important; }
    .speaker-avatar .avatar-status { font-size: 13px !important; }
    .avatar-toggle-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 80;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: #00482B;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(0,72,43,.25);
    }
    .avatar-toggle-btn:hover { transform: scale(1.06); }
    .speaker-avatar.minimized {
      width: 96px !important;
      height: 96px !important;
      border-radius: 999px !important;
      padding: 0 !important;
      overflow: visible !important;
      background: radial-gradient(circle at 50% 25%, rgba(251,225,34,.90), rgba(0,123,62,.95));
      display: grid;
      place-items: center;
    }
    .speaker-avatar.minimized .speaker-avatar-header,
    .speaker-avatar.minimized .avatar-info,
    .speaker-avatar.minimized .avatar-controls {
      display: none !important;
    }
    .speaker-avatar.minimized .speaker-avatar-body {
      padding: 0 !important;
      display: grid !important;
      place-items: center !important;
    }
    .speaker-avatar.minimized .avatar-video-wrap {
      width: 78px !important;
      height: 82px !important;
      flex-basis: 78px !important;
      transform: scale(.72);
      margin: 0;
    }

<script>
/* =====================================================================
   GUÍA RÁPIDA PARA EDITAR LA PRESENTACIÓN
   ---------------------------------------------------------------------
   1. Títulos principales: edita defaultConfig.
   2. Texto de cada hoja: edita slidesData.
   3. Botones de la hoja Bienvenidos: edita btn_start_text, btn_population_text y btn_rea_text.
   4. Contenido de los submenús: edita startMenuData, populationMenuData y reaMenuData.
   5. Módulos y secciones: edita contentModulesData.
   6. Saludo inicial de la voz: busca la variable welcomeText en speakStartupWelcome().
   7. Voz del avatar: edita rate, pitch y volume en speakText() y speakStartupWelcome().

   ORDEN DEL CÓDIGO:
   - ACCIÓN PRINCIPAL: hojas de la presentación.
   - ACCIÓN 1: botón Comencemos y sus pasos.
   - ACCIÓN 2: botón Población Objeto y sus secciones.
   - ACCIÓN 3: botón REA y sus secciones.
   - ACCIÓN 4: hoja Contenido y módulos.
   - Motores visuales y funciones de navegación.

   Esta versión mantiene la parte visual anterior; solo se ordenó y comentó
   el código para que sea más fácil editar cada acción.
   ===================================================================== */

// ===================== 1. CONFIGURACIÓN GENERAL EDITABLE =====================
// Estos valores controlan títulos, nombres de botones, colores, fuente y tamaño base.
const defaultConfig = {

  background_color: "#FFFBEA",
  text_color: "#00482B",

};

// =====================================================================
// ACCIÓN PRINCIPAL: HOJAS DE LA PRESENTACIÓN
// ---------------------------------------------------------------------
// Aquí está el contenido que se ve al avanzar con los botones Atrás/Siguiente
// o al elegir una hoja desde el menú lateral.
//
// ORDEN DE EDICIÓN:
// 1. Hoja Bienvenidos: muestra los botones Comencemos, Población Objeto y REA.
// 2. Hoja Contenido: muestra los módulos interactivos.
// 3. Hojas informativas adicionales.
//
// Para cambiar el texto visible de una hoja, edita la propiedad body.
// Para cambiar el icono grande, edita la propiedad accent.
// No cambies twoButtons ni contentSlide, salvo que sepas que quieres modificar la estructura.
// =====================================================================
const slidesData = [
  // Hoja 1: Bienvenidos
  { icon: "sparkles", body: "Una presentación interactiva inspirada en la paleta institucional de la Universidad de Cundinamarca.", accent: "🎓", twoButtons: true },
  // Hoja 2: Contenido
  { icon: "book", body: "Explora contenido temático organizado en 6 módulos.", accent: "📚", contentSlide: true },

  // Hoja 3: Sobre Nosotros
  { icon: "users", body: "Somos un equipo comprometido con la innovación, el aprendizaje y el desarrollo creativo.", accent: "👥" },

  // Hoja 4: Servicios
  { icon: "zap", body: "Ofrecemos soluciones digitales, diseño y desarrollo a medida.", accent: "⚡" },

  // Hoja 5: Contacto
  { icon: "mail", body: "¿Listo para colaborar? Escríbenos y hagamos algo increíble juntos.", accent: "✉️" }

// Todo lo que se abre desde el botón Población Objeto está debajo.

const reaMenuData = {

// Para agregar un módulo, copia un bloque completo { title, subtitle, sections }.
// Para eliminar un módulo, borra su bloque completo.
// =====================================================================
const contentModulesData = [
  { title: "Módulo 1: Fundamentos", subtitle: "Bases sólidas para el éxito", sections: [

    { title: "Métricas y KPIs", content: "Mide el éxito con indicadores clave de desempeño." }
  ]},
  { title: "Módulo 6: Impacto Social", subtitle: "Negocio con propósito", sections: [
    { title: "Responsabilidad Social", content: "Crea valor para la sociedad mientras creces económicamente." },
    { title: "Sostenibilidad", content: "Implementa prácticas amigables con el medio ambiente." },
    { title: "Comunidad", content: "Construye conexiones significativas con tu audiencia." }
  ]}
];

let currentSlide = 0;
let sidebarOpen = false;
let currentView = "main";
let submenuType = null;
let currentModuleIndex = -1;
let currentSectionIndex = -1;

function cfg() { return window.elementSdk ? window.elementSdk.config : defaultConfig; }
function safeText(value, fallback) { return value || fallback; }
function escapeAttr(value) { return String(value || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function colorBlocks() { return `<div class="decor-blocks"><span></span><span></span><span></span><span></span></div>`; }
function icon(name, size = 20) { return `<i data-lucide="${name}" style="width:${size}px;height:${size}px;"></i>`; }

function slideShell(inner, extra = "") {
  return `<div class="uc-card ${extra}"><div class="uc-ribbon"></div><div class="relative z-10 h-full flex flex-col items-center justify-center text-center gap-6 p-7 md:p-12">${inner}</div></div>`;
}

// =====================================================================
// MOTOR VISUAL DE LAS HOJAS
// ---------------------------------------------------------------------
// Esta función construye visualmente las hojas anteriores.
// Recomendación: no la edites si solo quieres cambiar textos.
// El diseño visual se conserva igual que la versión anterior.
// =====================================================================
function buildSlides(config = cfg()) {
  const container = document.getElementById('slidesContainer');
  const titles = [
    safeText(config.main_title, defaultConfig.main_title),
    safeText(config.content_title, defaultConfig.content_title),
    "Sobre Nosotros",
    "Servicios",
    "Contacto"
  ];
  const slideWelcome = (index, body) => index === 0 ? `${titles[index]}. ${body}` : `Bienvenidos a la hoja ${titles[index]}. ${body}`;

  container.innerHTML = slidesData.map((s, i) => {
    if (s.twoButtons) {
      const inner = `
        <div class="flex items-center gap-4 mb-2">
          <div class="brand-mark">UC</div>
          <div class="text-left">
            <div class="uc-badge">Universidad de Cundinamarca</div>
          </div>
        </div>
        <div class="text-6xl md:text-7xl">${s.accent}</div>
        <h1 class="slide-title text-5xl md:text-7xl font-extrabold leading-tight" style="color:#00482B;" data-speak="${escapeAttr(slideWelcome(0, s.body))}">${titles[0]}</h1>
        <p class="slide-body text-lg md:text-xl leading-relaxed max-w-2xl" style="color:#00482B;opacity:.78;" data-speak="${escapeAttr(s.body)}">${s.body}</p>
        ${colorBlocks()}
        <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-2xl">
          <button class="resource-btn px-6 py-4 rounded-2xl font-extrabold flex items-center justify-center gap-3" style="background:linear-gradient(135deg,#007B3E,#00482B);color:white;" data-speak="${escapeAttr('Botón Comencemos. Abre el menú de introducción.')}" onclick="openSubmenu('start')">${icon('play',18)} ${safeText(config.btn_start_text, 'Comencemos')}</button>
          <button class="resource-btn px-6 py-4 rounded-2xl font-extrabold flex items-center justify-center gap-3" style="background:linear-gradient(135deg,#FBE122,#DAA000);color:#00482B;" data-speak="${escapeAttr('Botón Población Objetivo. Abre la información sobre a quién va dirigida la presentación.')}" onclick="openSubmenu('population')">${icon('users',18)} ${safeText(config.btn_population_text, 'Población Objeto')}</button>
        </div>
        <button class="resource-btn px-7 py-4 rounded-2xl font-extrabold flex items-center justify-center gap-3" style="background:#FFFFFF;color:#00482B;border:2px solid rgba(0,123,62,.25);" data-speak="${escapeAttr('Botón REA. Abre los recursos educativos abiertos.')}" onclick="openSubmenu('rea')">${icon('book-open',18)} ${safeText(config.btn_rea_text, 'REA')}</button>
      `;
      return `<section class="slide ${i === currentSlide ? 'active' : ''} w-full items-center justify-center" data-slide="${i}">${slideShell(inner)}</section>`;
    }

    if (s.contentSlide) {
      const inner = `
        <div class="uc-badge">Ruta de aprendizaje</div>
        <div class="text-6xl">${s.accent}</div>
        <h1 class="slide-title text-4xl md:text-6xl font-extrabold" style="color:#00482B;" data-speak="${escapeAttr(slideWelcome(i, s.body))}">${titles[i]}</h1>
        <p class="slide-body text-lg leading-relaxed max-w-2xl" style="color:#00482B;opacity:.74;" data-speak="${escapeAttr(s.body)}">${s.body}</p>
        ${colorBlocks()}
        <div class="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full">

              <div class="text-3xl mb-3">${['🎯','📊','🚀','💡','📈','🌍'][idx]}</div>
              <div class="font-extrabold text-lg">${module.title}</div>
              <div class="text-sm opacity-80 mt-1">${module.subtitle}</div>
            </button>
          `).join('')}
        </div>`;
      return `<section class="slide ${i === currentSlide ? 'active' : ''} w-full items-center justify-center" data-slide="${i}">${slideShell(inner)}</section>`;
    }

    const inner = `
      <div class="uc-badge">Presentación interactiva</div>
      <div class="text-6xl">${s.accent}</div>
      <h1 class="slide-title text-4xl md:text-6xl font-extrabold" style="color:#00482B;" data-speak="${escapeAttr(slideWelcome(i, s.body))}">${titles[i]}</h1>
      <p class="slide-body text-lg md:text-xl leading-relaxed max-w-2xl" style="color:#00482B;opacity:.76;" data-speak="${escapeAttr(s.body)}">${s.body}</p>
      ${colorBlocks()}
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full max-w-xl mt-4">

        <div class="rounded-2xl p-4 font-bold" style="background:#00482B;color:white;">Futuro</div>
      </div>`;
    return `<section class="slide ${i === currentSlide ? 'active' : ''} w-full items-center justify-center" data-slide="${i}">${slideShell(inner)}</section>`;
  }).join('');

  buildMenu(titles);
  updateSlideUI(config);
  lucide.createIcons();
}

function buildMenu(titles) {
  const menu = document.getElementById('slideMenu');
  menu.innerHTML = titles.map((t, i) => `
    <button class="menu-item ${i === currentSlide ? 'active-item' : ''} flex items-center gap-3 px-3 py-3 rounded-xl text-left text-sm text-white/85" data-speak="${escapeAttr(i === 0 ? 'Botón del menú. Abre la hoja de inicio.' : 'Botón del menú. Bienvenidos a la hoja ' + t + '. Haz clic para abrir esta hoja.')}" onclick="goToSlide(${i})">
      <span class="w-8 h-8 rounded-xl flex items-center justify-center text-xs font-extrabold" style="background:${i === currentSlide ? '#FBE122' : 'rgba(255,255,255,0.10)'};color:${i === currentSlide ? '#00482B' : 'white'};">${i + 1}</span>
      <span class="truncate">${t}</span>
    </button>`).join('');
}

function updateSlideUI(config = cfg()) {
  const total = slidesData.length;
  document.querySelectorAll('.slide').forEach((el, i) => el.classList.toggle('active', i === currentSlide));
  document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${total}`;
  const slideNamesForVoice = [safeText(cfg().main_title, defaultConfig.main_title), safeText(cfg().content_title, defaultConfig.content_title), 'Qué son las wikis', 'Cómo crear una wiki', 'Conclusiones'];
  const activeTitleForVoice = slideNamesForVoice[currentSlide] || 'esta hoja';
  document.getElementById('slideCounter').setAttribute('data-speak', currentSlide === 0 ? `Hoja ${currentSlide + 1} de ${total}. Hoja de inicio.` : `Hoja ${currentSlide + 1} de ${total}. Bienvenidos a la hoja ${activeTitleForVoice}.`);
  const prevVoiceTitle = slideNamesForVoice[(currentSlide - 1 + total) % total] || 'anterior';
  const nextVoiceTitle = slideNamesForVoice[(currentSlide + 1) % total] || 'siguiente';
  const prevBtnForVoice = document.getElementById('prevBtn');
  const nextBtnForVoice = document.getElementById('nextBtn');
  if (prevBtnForVoice) prevBtnForVoice.setAttribute('data-speak', `Botón Atrás. Te lleva a la hoja ${prevVoiceTitle}.`);
  if (nextBtnForVoice) nextBtnForVoice.setAttribute('data-speak', `Botón Siguiente. Te lleva a la hoja ${nextVoiceTitle}.`);
  document.getElementById('progressBar').style.width = `${((currentSlide + 1) / total) * 100}%`;

  const dots = document.getElementById('dots');
  dots.innerHTML = Array.from({ length: total }, (_, i) =>
    `<button onclick="goToSlide(${i})" class="dot h-2 rounded-full ${i === currentSlide ? 'active-dot' : 'w-2'}" style="background:${i === currentSlide ? '#00482B' : 'rgba(0,72,43,0.25)'};"></button>`
  ).join('');

  document.querySelectorAll('.menu-item').forEach((el, i) => {
    el.classList.toggle('active-item', i === currentSlide);
    const badge = el.querySelector('span');
    if (badge) {
      badge.style.background = i === currentSlide ? '#FBE122' : 'rgba(255,255,255,0.10)';
      badge.style.color = i === currentSlide ? '#00482B' : 'white';
    }
  });
}

function renderPanel(title, subtitle, contentHtml, backAction) {
  const container = document.getElementById('slidesContainer');
  container.innerHTML = `
    <div class="uc-card w-full">
      <div class="uc-ribbon"></div>
      <div class="relative z-10 flex flex-col items-center text-center gap-5 p-6 md:p-10 pt-8 md:pt-12 h-full overflow-y-auto">
        <!-- BOTÓN ATRÁS DE SUBMENÚS/MÓDULOS/SECCIONES -->
        <button class="back-btn px-5 py-3 rounded-2xl font-extrabold flex items-center gap-2" style="background:#00482B;color:white;" onclick="${backAction}()">
          ${icon('arrow-left',18)} Atrás
        </button>
        <div class="uc-badge">Universidad de Cundinamarca</div>
        <h1 class="text-3xl md:text-5xl font-extrabold" style="color:#00482B;">${title}</h1>
        <p class="text-lg max-w-2xl" style="color:#007B3E;opacity:.88;">${subtitle}</p>
        ${colorBlocks()}
        ${contentHtml}
      </div>
    </div>`;
  lucide.createIcons();
}

// Renderiza los submenús de los botones de la primera hoja.
// =====================================================================
// MOTOR DE APERTURA DE SUBMENÚS
// ---------------------------------------------------------------------
// Esta función toma la información de startMenuData, populationMenuData o reaMenuData
// y la muestra en pantalla. No cambia el diseño general anterior.
// =====================================================================
function renderSubmenu(menuData) {
  const content = `<div class="mt-5 grid grid-cols-1 gap-4 w-full max-w-3xl">
    ${menuData.sections.map((section, idx) => `
      <button class="module-card p-6 rounded-3xl text-left" style="background:white;border:1px solid rgba(0,72,43,.16);color:#00482B;" onclick="openSubmenuSection(${idx})">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-extrabold shrink-0" style="background:#FBE122;color:#00482B;">${idx + 1}</div>
          <div><h3 class="font-extrabold text-lg mb-2">${section.title}</h3><p class="text-sm opacity-75 leading-relaxed">${section.content}</p></div>
        </div>
      </button>`).join('')}
  </div>`;
  renderPanel(menuData.title, menuData.subtitle, content, 'goToMainView');
}

// Renderiza un módulo y sus secciones en pantalla.
// =====================================================================
// MOTOR DE APERTURA DE MÓDULOS
// ---------------------------------------------------------------------
// Esta función toma cada módulo definido en contentModulesData y muestra
// sus secciones internas.
// =====================================================================
function renderModule(moduleData) {
  const content = `<div class="mt-5 grid grid-cols-1 gap-4 w-full max-w-3xl">
    ${moduleData.sections.map((section, idx) => `
      <button class="module-card p-6 rounded-3xl text-left" style="background:${idx === 1 ? '#FBE122' : 'white'};border:1px solid rgba(0,72,43,.16);color:#00482B;" onclick="openModuleSection(${idx})">
        <div class="flex items-start gap-4">
          <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-extrabold shrink-0" style="background:#007B3E;color:white;">${idx + 1}</div>
          <div><h3 class="font-extrabold text-lg mb-2">${section.title}</h3><p class="text-sm opacity-75 leading-relaxed">${section.content}</p></div>
        </div>
      </button>`).join('')}
  </div>`;
  renderPanel(moduleData.title, moduleData.subtitle, content, 'goToContentView');
}

function renderSection(sectionTitle, sectionContent, backAction) {
  const content = `
    <div class="mt-6 p-7 md:p-9 rounded-3xl text-left max-w-3xl" style="background:white;border:1px solid rgba(0,72,43,.16);box-shadow:0 18px 40px rgba(0,72,43,.12);color:#00482B;">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:#FBE122;color:#00482B;">${icon('check-circle',24)}</div>
        <h2 class="text-2xl font-extrabold">${sectionTitle}</h2>
      </div>
      <p class="text-lg leading-relaxed opacity-80">${sectionContent}</p>
    </div>`;
  renderPanel(sectionTitle, "Detalle del tema seleccionado", content, backAction);
}

// =====================================================================
// ACCIONES DE CLIC
// ---------------------------------------------------------------------
// Estas funciones conectan cada botón con el bloque de contenido correspondiente.
// No cambies estos nombres si quieres conservar la interactividad.
// =====================================================================
function openSubmenu(type) {
  currentView = "submenu";
  submenuType = type;
  currentSectionIndex = -1;
  if (type === "start") renderSubmenu(startMenuData);
  if (type === "population") renderSubmenu(populationMenuData);
  if (type === "rea") renderSubmenu(reaMenuData);
}

function openSubmenuSection(sectionIndex) {
  currentView = "submenu_section";
  currentSectionIndex = sectionIndex;
  const data = submenuType === "start" ? startMenuData : submenuType === "population" ? populationMenuData : reaMenuData;
  const section = data.sections[sectionIndex];
  if (section) renderSection(section.title, section.content, 'goToSubmenuView');
}

function openModule(moduleIndex) {
  currentView = "module";
  currentModuleIndex = moduleIndex;
  currentSectionIndex = -1;
  renderModule(contentModulesData[moduleIndex]);
}

function openModuleSection(sectionIndex) {
  currentView = "module_section";
  currentSectionIndex = sectionIndex;
  const section = contentModulesData[currentModuleIndex]?.sections[sectionIndex];
  if (section) renderSection(section.title, section.content, 'goToModuleView');
}

function goToMainView() {
  currentView = "main";
  currentSlide = 0;
  submenuType = null;
  currentModuleIndex = -1;
  currentSectionIndex = -1;
  buildSlides(cfg());
}

function goToSubmenuView() {
  currentView = "submenu";
  if (submenuType) openSubmenu(submenuType);
}

function goToContentView() {
  currentView = "main";
  currentSlide = 1;
  submenuType = null;
  currentModuleIndex = -1;
  currentSectionIndex = -1;
  buildSlides(cfg());
}

function goToModuleView() {
  currentView = "module";
  if (currentModuleIndex >= 0) renderModule(contentModulesData[currentModuleIndex]);
}

// Cambia la hoja activa. No edites esta función si solo quieres cambiar textos.
function goToSlide(i) {
  currentView = "main";
  currentSlide = i;
  buildSlides(cfg());
  closeSidebar();
}

function handleBack() {
  if (currentView === "submenu") goToMainView();
  else if (currentView === "submenu_section") goToSubmenuView();
  else if (currentView === "module") goToContentView();
  else if (currentView === "module_section") goToModuleView();
  else goToSlide((currentSlide - 1 + slidesData.length) % slidesData.length);
}

function handleNext() {
  if (currentView === "main") goToSlide((currentSlide + 1) % slidesData.length);
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('sidebar-open', sidebarOpen);
  document.getElementById('sidebar').classList.toggle('sidebar-closed', !sidebarOpen);
  document.getElementById('overlay').classList.toggle('hidden', !sidebarOpen);
}
function closeSidebar() {
  sidebarOpen = false;
  document.getElementById('sidebar').classList.add('sidebar-closed');
  document.getElementById('sidebar').classList.remove('sidebar-open');
  document.getElementById('overlay').classList.add('hidden');
}

function closeResourceModal() { document.getElementById('resourceModal').classList.remove('active-modal'); }

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
document.getElementById('closeMenu').addEventListener('click', closeSidebar);
document.getElementById('overlay').addEventListener('click', closeSidebar);
document.getElementById('prevBtn').addEventListener('click', handleBack);
document.getElementById('nextBtn').addEventListener('click', handleNext);
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') handleBack();
  if (e.key === 'ArrowRight') handleNext();
  if (e.key === 'Escape') closeSidebar();
});


// Avatar expositor: saludo inicial automático y voz solo mientras el cursor está encima.
// ===================== 7. CONFIGURACIÓN DE VOZ Y AVATAR =====================
// Último texto que leyó el avatar. El botón Repetir usa este texto.
let lastSpokenText = "Bienvenidos a este ODC de una Wiki para el aprendizaje de redes.";
let speechEnabled = true;
let activeSpeakElement = null;
let hoverSpeakTimer = null;
let startupWelcomePlayed = false;
let selectedSpanishVoice = null;
// Controla si el avatar está minimizado o visible en tamaño grande.
let avatarMinimized = false;

function selectSpanishVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  selectedSpanishVoice =
    voices.find(v => /^es[-_]CO/i.test(v.lang)) ||
    voices.find(v => /^es[-_]/i.test(v.lang) && /Colombia|Colombian/i.test(v.name)) ||
    voices.find(v => /^es[-_]MX/i.test(v.lang)) ||
    voices.find(v => /^es[-_]ES/i.test(v.lang)) ||
    voices.find(v => /^es[-_]/i.test(v.lang)) ||
    voices[0] || null;
  return selectedSpanishVoice;
}

function whenVoicesReady(callback) {
  if (!('speechSynthesis' in window)) { callback(); return; }
  const synth = window.speechSynthesis;
  if (synth.getVoices().length) {
    selectSpanishVoice();
    callback();
    return;
  }
  let done = false;
  const run = () => {
    if (done) return;
    done = true;
    selectSpanishVoice();
    callback();
  };
  synth.onvoiceschanged = run;
  setTimeout(run, 700);
}

function cleanTextForSpeech(text) {
  return (text || '')
    .replace(/\s+/g, ' ')
    .replace(/[🚀📚👥⚡✉️🎯📊💡📈🌍]/g, '')
    .trim();
}


// Muestra u oculta el aviso que recomienda usar Repetir cuando el navegador bloquea la voz.
function showVoiceHelp(show) {
  const help = document.getElementById('voiceHelpMessage');
  if (help) help.style.display = show ? 'block' : 'none';
}

// Cambia el avatar entre vista grande y vista minimizada sin apagar la voz.
function toggleAvatarMinimized() {
  const avatar = document.getElementById('speakerAvatar');
  const toggleBtn = document.getElementById('avatarToggleBtn');
  if (!avatar || !toggleBtn) return;
  avatarMinimized = !avatarMinimized;
  avatar.classList.toggle('minimized', avatarMinimized);
  toggleBtn.textContent = avatarMinimized ? '+' : '−';
  toggleBtn.title = avatarMinimized ? 'Restaurar avatar' : 'Minimizar avatar';
  toggleBtn.setAttribute('aria-label', toggleBtn.title);
}

function setAvatarSpeaking(isSpeaking, message) {
  const avatar = document.getElementById('speakerAvatar');
  const status = document.getElementById('avatarStatus');
  const video = document.getElementById('agentVideo');
  if (!avatar || !status) return;
  avatar.classList.toggle('speaking', isSpeaking);
  status.textContent = message || (isSpeaking ? 'Hablando mientras mantienes el cursor aquí...' : 'Pasa el cursor por un texto.');
  if (isSpeaking) showVoiceHelp(false);
  if (video) {
    if (isSpeaking) {
      video.play().catch(() => {});
    } else {
      video.pause();
      try { video.currentTime = 0; } catch (e) {}
    }
  }
}

function stopSpeaking(message = 'Cursor fuera del elemento. Voz detenida.') {
  clearTimeout(hoverSpeakTimer);
  hoverSpeakTimer = null;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  if (activeSpeakElement) activeSpeakElement.classList.remove('speak-hover-highlight');
  activeSpeakElement = null;
  setAvatarSpeaking(false, message);
}

// Lee en voz alta el texto del elemento sobre el que está el cursor.
// Para cambiar velocidad, tono o volumen, edita utterance.rate, utterance.pitch y utterance.volume.
function speakText(text, element) {
  const cleaned = cleanTextForSpeech(text);
  if (!cleaned || !speechEnabled) return;
  lastSpokenText = cleaned;
  if (!('speechSynthesis' in window)) {
    setAvatarSpeaking(false, 'Tu navegador no permite voz automática. Da clic en Repetir para poder oír.');
    return;
  }
  window.speechSynthesis.cancel();
  selectSpanishVoice();
  const utterance = new SpeechSynthesisUtterance(cleaned);
  utterance.lang = selectedSpanishVoice?.lang || 'es-CO';
  if (selectedSpanishVoice) utterance.voice = selectedSpanishVoice;
  utterance.rate = 0.95;
  utterance.pitch = 1.04;
  utterance.volume = 1;
  utterance.onstart = () => {
    if (activeSpeakElement === element) setAvatarSpeaking(true, 'Hablando mientras mantienes el cursor aquí...');
  };
  utterance.onend = () => {
    if (activeSpeakElement === element) setAvatarSpeaking(false, 'Terminó este texto. Mantén el cursor o pasa a otro.');
  };
  utterance.onerror = () => {
    if (activeSpeakElement === element) setAvatarSpeaking(false, 'No se pudo reproducir la voz. Da clic en Repetir para poder oír.');
  };
  window.speechSynthesis.speak(utterance);
}

function getSpeakableElement(target) {
  return target.closest('[data-speak], button, .slide-title, .slide-body, h1, h2, h3, p, .uc-badge, .module-card, .resource-btn, .menu-item');
}

function getElementSpeechText(element) {
  if (!element) return '';
  return element.getAttribute('data-speak') || element.innerText || element.textContent || '';
}


// Mensaje inicial automático: se reproduce una sola vez al abrir la presentación.
function speakStartupWelcome() {
  if (startupWelcomePlayed || !speechEnabled) return;

  // EDITA AQUÍ EL SALUDO INICIAL DE LA PRIMERA HOJA
  const welcomeText = 'Bienvenidos a este ODC de una Wiki para el aprendizaje de redes.';
  lastSpokenText = welcomeText;

  if (!('speechSynthesis' in window)) {
    setAvatarSpeaking(false, 'Tu navegador no permite voz automática. Da clic en Repetir para poder oír.');
    return;
  }

  whenVoicesReady(() => {
    if (startupWelcomePlayed || activeSpeakElement || !speechEnabled) return;

    const synth = window.speechSynthesis;
    synth.cancel();
    selectSpanishVoice();

    const utterance = new SpeechSynthesisUtterance(welcomeText);
    utterance.lang = selectedSpanishVoice?.lang || 'es-CO';
    if (selectedSpanishVoice) utterance.voice = selectedSpanishVoice;
    utterance.rate = 0.95;
    utterance.pitch = 1.04;
    utterance.volume = 1;

    utterance.onstart = () => {
      startupWelcomePlayed = true;
      setAvatarSpeaking(true, 'Saludo inicial de bienvenida...');
    };
    utterance.onend = () => {
      if (!activeSpeakElement) setAvatarSpeaking(false, 'Pasa el cursor por un texto para escucharlo.');
    };
    utterance.onerror = () => {
      startupWelcomePlayed = false;
      setAvatarSpeaking(false, 'El navegador bloqueó la voz inicial. Da clic en Repetir para poder oír.');
    };

    synth.speak(utterance);

    setTimeout(() => {
      if (synth.paused) synth.resume();
    }, 250);
  });
}

function scheduleStartupWelcome() {
  const start = () => {
    setTimeout(() => {
      if (!activeSpeakElement) speakStartupWelcome();
    }, 450);
  };

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    start();
  } else {
    document.addEventListener('DOMContentLoaded', start, { once: true });
  }
  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!startupWelcomePlayed && !activeSpeakElement) speakStartupWelcome();
    }, 900);
  }, { once: true });
}

function installAvatarSpeech() {
  // Obtiene los botones y el contenedor del avatar.
  const repeatBtn = document.getElementById('avatarRepeatBtn');
  const stopBtn = document.getElementById('avatarStopBtn');
  const toggleBtn = document.getElementById('avatarToggleBtn');
  const avatar = document.getElementById('speakerAvatar');

  // Botón Repetir: intenta reproducir el último texto leído, incluso si el cursor ya no está sobre un elemento.
  if (repeatBtn) repeatBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    speechEnabled = true;
    showVoiceHelp(false);
    speakText(lastSpokenText, activeSpeakElement || repeatBtn);
  });

  // Botón Minimizar/Restaurar: cambia el tamaño del avatar conservando el habla.
  if (toggleBtn) toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleAvatarMinimized();
  });

  // Botón Silenciar/Activar voz: permite apagar o encender la lectura.
  if (stopBtn) stopBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    speechEnabled = !speechEnabled;
    stopSpeaking(speechEnabled ? 'Voz activada. Pasa el cursor por un texto.' : 'Voz desactivada.');
    stopBtn.textContent = speechEnabled ? 'Silenciar' : 'Activar voz';
  });

  if (avatar) avatar.addEventListener('click', (e) => e.stopPropagation());

  // Detecta cuando el cursor entra en un texto, botón o tarjeta para iniciar lectura.
  document.addEventListener('mouseover', (e) => {
    const element = getSpeakableElement(e.target);
    if (!element || element.closest('#speakerAvatar')) return;
    if ('speechSynthesis' in window && !activeSpeakElement) window.speechSynthesis.cancel();

    const text = cleanTextForSpeech(getElementSpeechText(element));
    if (!text || text.length < 2) return;

    if (activeSpeakElement && activeSpeakElement !== element) {
      activeSpeakElement.classList.remove('speak-hover-highlight');
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    activeSpeakElement = element;
    element.classList.add('speak-hover-highlight');
    setAvatarSpeaking(false, 'Preparando lectura...');

    clearTimeout(hoverSpeakTimer);
    hoverSpeakTimer = setTimeout(() => {
      if (activeSpeakElement === element && element.matches(':hover')) speakText(text, element);
    }, 180);
  });

  // Detecta cuando el cursor sale del elemento para detener la voz inmediatamente.
  document.addEventListener('mouseout', (e) => {
    const element = getSpeakableElement(e.target);
    if (!element || element.closest('#speakerAvatar')) return;

    const stillInside = e.relatedTarget && element.contains(e.relatedTarget);
    if (stillInside) return;

    if (activeSpeakElement === element) stopSpeaking();
    else element.classList.remove('speak-hover-highlight');
  });
}

async function initElementSdk() {
  if (!window.elementSdk) {
    buildSlides(defaultConfig);
    return;
  }
  await window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      document.body.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;
      if (currentView === "main") buildSlides(config);
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
    }),
    mapToEditPanelValues: (config) => new Map([
      ["main_title", config.main_title || defaultConfig.main_title],
      ["content_title", config.content_title || defaultConfig.content_title],
      ["btn_start_text", config.btn_start_text || defaultConfig.btn_start_text],
      ["btn_population_text", config.btn_population_text || defaultConfig.btn_population_text],
      ["btn_rea_text", config.btn_rea_text || defaultConfig.btn_rea_text]
    ])
  });
  buildSlides(window.elementSdk.config || defaultConfig);
}

initElementSdk();
installAvatarSpeech();
scheduleStartupWelcome();
if ('speechSynthesis' in window) {
  selectSpanishVoice();
  window.speechSynthesis.onvoiceschanged = selectSpanishVoice;
}
lucide.createIcons();
</script>
